name: Build & Release

on:
  push:
    branches: ["**"]
    tags:
      - "v*"
  pull_request:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    name: "Test py${{ matrix.python-version }} [${{ matrix.extras }}]"
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]
        extras: ["dev", "dev,mcp"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # setuptools-scm needs full history + tags

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and deps (extras = ${{ matrix.extras }})
        run: pip install -e ".[${{ matrix.extras }}]"
        working-directory: SerenMemory
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: "0.0.0"

      - name: Run tests
        run: python -m pytest tests/ -v
        working-directory: SerenMemory

  build-and-release:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # setuptools-scm needs full history + tags

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Update version in init.py
        run: |
          version=$(echo "${GITHUB_REF#refs/tags/}" | sed 's/^v//')
          sed -i "s/__version__ = .*/__version__ = '${version}'/" SerenMemory/seren_memory/__init__.py

      - name: Install build
        run: pip install build

      - name: Build wheel and sdist
        run: python -m build
        working-directory: SerenMemory

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: SerenMemory/dist/*

  build-vscode:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Sync version with git tag
        working-directory: SerenMemoryVSCode
        run: |
          version=$(echo "${GITHUB_REF#refs/tags/}" | sed 's/^v//')
          npm version "$version" --no-git-tag-version

      - name: Install dependencies
        working-directory: SerenMemoryVSCode
        run: npm install

      - name: Run extension unit tests
        working-directory: SerenMemoryVSCode
        run: npm test

      - name: Build and package
        working-directory: SerenMemoryVSCode
        run: |
          npm run build -- --production
          npm run package

      - name: Upload .vsix to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: SerenMemoryVSCode/*.vsix
