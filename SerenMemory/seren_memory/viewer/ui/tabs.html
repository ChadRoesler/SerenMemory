<!-- The seven Halls. Shell contract: class="tab" data-tab="<tier>" so the shell
     styles them (underline) + auto-activates the first. onclick routes through
     the leaf switchTab(), which drives the single-canvas content + lazy load.
     The .dot is leaf-styled per tier (see styles.css). -->
<button class="tab" data-tab="short" onclick="switchTab('short')"><span class="dot"></span>ShortTerm</button>
<button class="tab" data-tab="near" onclick="switchTab('near')"><span class="dot"></span>NearTerm</button>
<button class="tab" data-tab="long" onclick="switchTab('long')"><span class="dot"></span>LongTerm</button>
<button class="tab" data-tab="briefs" onclick="switchTab('briefs')"><span class="dot"></span>Briefs</button>
<button class="tab" data-tab="drafts" onclick="switchTab('drafts')"><span class="dot"></span>Drafts</button>
<button class="tab" data-tab="search" onclick="switchTab('search')"><span class="dot"></span>Search</button>
<button class="tab" data-tab="overview" onclick="switchTab('overview')"><span class="dot"></span>Overview</button>
